<!DOCTYPE html>
<html>
<head>
    <title>GLB AR System</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* Navbar */
        .navbar {
            background-color: #2c3e50;
            color: white;
            padding: 15px;
            font-size: 18px;
        }

        /* Layout */
        .container {
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 220px;
            background-color: #34495e;
            height: 100vh;
            padding-top: 20px;
        }

        .sidebar a {
            display: block;
            color: white;
            padding: 12px;
            text-decoration: none;
        }

        .sidebar a:hover {
            background-color: #1abc9c;
        }

        /* Content */
        .content {
            flex: 1;
            padding: 20px;
        }
    </style>
</head>

<body>

<!-- 🔝 NAVBAR -->
<div class="navbar">
    🌸 GLB AR Viewer System
</div>

<div class="container">

    <!-- 📚 SIDEBAR -->
    <div class="sidebar">
        <a href="/">🏠 Home</a>
        <a href="/upload/">⬆ Upload Model</a>
        <a href="/mobile/">📱 Mobile AR</a>
        <a href="/laptop_ar/">💻 Laptop AR</a>
    </div>

    <!-- 📄 MAIN CONTENT -->
    <div class="content">
        {% block content %}
        {% endblock %}
    </div>

</div>

</body>
</html>
