{% extends 'base.html' %}

{% block content %}

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<h2>📱 Mobile AR Viewer</h2>

{% if model %}
<model-viewer 
    src="{{ model.file.url }}"
    ar
    camera-controls
    auto-rotate
    shadow-intensity="1"
    style="width:100%; height:70vh;"
>
    <button slot="ar-button">🚀 Activate AR</button>
</model-viewer>
{% else %}
<p>No model uploaded</p>
{% endif %}

{% endblock %}
